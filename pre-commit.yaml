repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-format
        files: ^backend/
      - id: ruff
        args: [--fix]
        files: ^backend/
  - repo: local
    hooks:
      - id: backend-check
        name: backend-check
        entry: task check:backend
        language: system
        pass_filenames: false
      - id: backend-test
        name: backend-test
        entry: task test:backend
        language: system
        pass_filenames: false
      - id: frontend-check
        name: frontend-check
        entry: task check:frontend
        language: system
        pass_filenames: false
      - id: tooling-check
        name: tooling-check
        entry: task check:tooling
        language: system
        pass_filenames: false
      - id: dependabot-check
        name: dependabot-check
        entry: bash -c 'cd backend && uv run python ../scripts/check_dependabot.py'
        language: system
        pass_filenames: false
        files: ^(\.github/dependabot\.yml|scripts/check_dependabot\.py)$
      - id: frontend-test
        name: frontend-test
        entry: task test:frontend
        language: system
        pass_filenames: false
