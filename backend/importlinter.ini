[importlinter]
root_package = src

[importlinter:contract:core_does_not_import_outer_layers]
name = core は adapters と api を import しない
type = forbidden
source_modules =
    src.core
forbidden_modules =
    src.adapters
    src.api

[importlinter:contract:adapters_do_not_import_api]
name = adapters は api を import しない
type = forbidden
source_modules =
    src.adapters
forbidden_modules =
    src.api
